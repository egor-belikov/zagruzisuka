# Mihomo: исходящие ноды — та же подписка, что и раньше (wizard).
# «Списки» для заблокированных из РФ сервисов — rule-providers из
# https://github.com/itdoginfo/allow-domains (как в рекомендациях вокруг
# https://github.com/igareck/vpn-configs-for-russia — там же описаны сценарии
# чёрный/белый список; сами URL подписок igareck здесь не используются).

mixed-port: 10808
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
secret: ""

proxy-providers:
  wizard:
    type: http
    url: "https://sub.wizard.cheap/sub/1664b061fd5fdffd3123ace49178100e"
    path: ./providers/wizard.yaml
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: https://connectivitycheck.gstatic.com/generate_204

proxy-groups:
  - name: PROXY
    type: url-test
    use:
      - wizard
    url: https://connectivitycheck.gstatic.com/generate_204
    interval: 300
    lazy: false

rule-providers:
  russia-inside-domain:
    type: http
    behavior: domain
    format: mrs
    url: https://github.com/itdoginfo/allow-domains/releases/latest/download/russia_inside_domain.mrs
    path: ./ruleset/russia_inside_domain.mrs
    interval: 43200
  meta-ipcidr:
    type: http
    behavior: classical
    format: mrs
    url: https://github.com/itdoginfo/allow-domains/releases/latest/download/meta_ipcidr.mrs
    path: ./ruleset/meta_ipcidr.mrs
    interval: 43200

rules:
  - RULE-SET,russia-inside-domain,PROXY
  - RULE-SET,meta-ipcidr,PROXY
  - IP-CIDR,149.154.160.0/20,PROXY
  - IP-CIDR,91.108.4.0/22,PROXY
  - IP-CIDR,91.108.8.0/22,PROXY
  - IP-CIDR,91.108.12.0/22,PROXY
  - IP-CIDR,91.108.16.0/22,PROXY
  - IP-CIDR,91.108.56.0/22,PROXY
  - IP-CIDR,91.108.32.0/22,PROXY
  - IP-CIDR,95.161.64.0/20,PROXY
  - IP-CIDR,91.105.192.0/23,PROXY
  - IP-CIDR,185.76.151.0/24,PROXY
  - DOMAIN-SUFFIX,t.me,PROXY
  - DOMAIN-SUFFIX,telegram.org,PROXY
  - DOMAIN-SUFFIX,telegra.ph,PROXY
  - DOMAIN-SUFFIX,tdesktop.com,PROXY
  - DOMAIN-SUFFIX,telesco.pe,PROXY
  - DOMAIN-SUFFIX,instagram.com,PROXY
  - DOMAIN-SUFFIX,cdninstagram.com,PROXY
  - DOMAIN-SUFFIX,fbcdn.net,PROXY
  - DOMAIN-SUFFIX,facebook.com,PROXY
  - DOMAIN-SUFFIX,fb.com,PROXY
  - DOMAIN-SUFFIX,tiktok.com,PROXY
  - DOMAIN-SUFFIX,tiktokv.com,PROXY
  - DOMAIN-SUFFIX,ttwstatic.com,PROXY
  - DOMAIN-SUFFIX,pornhub.com,PROXY
  - DOMAIN-SUFFIX,phncdn.com,PROXY
  - DOMAIN-SUFFIX,phprcdn.com,PROXY
  - GEOIP,ru,DIRECT
  - MATCH,DIRECT
